<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
{{ partial "head.html" . }}

<body class="max-width mx-auto px3 ltr">
  <div class="content index py4">

    {{ partial "header.html" . }}

    {{ block "main" . }}
    {{ end }}

    <!-- {{ if .Site.Params.enableGiscus }}
      {{ partial "comment.html" . }}
    {{ end }} -->

    {{ partial "footer.html" . }}

  </div>
	<div id="lightbox" class="lightbox hidden">
	  <span class="lightbox-close">&times;</span>
	  <div class="lightbox-content"></div>
	</div>
</body>

<link rel="stylesheet" href={{ "lib/font-awesome/css/all.min.css" | relURL }}>
<link rel="stylesheet" href={{ "css/imageviewer.css" | relURL }}>
<link rel="stylesheet" href={{ "css/github-dark.css" | relURL }}>
<link rel="stylesheet" href={{ "css/github-light.css" | relURL }}>
<link href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
<script src={{ "lib/jquery/jquery.min.js" | relURL }}></script>
<script src={{ "js/main.js" | relURL }}></script>
<script src={{ "js/imageviewer.js" | relURL }}></script>
<script src={{ "js/theme-toggle.js" | relURL }}></script>
<script src={{ "js/charming.js" | relURL }}></script>
<script src={{ "js/rocket.js" | relURL }}></script>
<script src={{ "js/theme-image.js" | relURL }}></script>

</html>
